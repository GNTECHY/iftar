<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Media | Noor Iftar Series</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #0A192F;
            --secondary: #112240;
            --accent: #D4AF37;
            --text: #F8F8F8;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--primary);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .viewer-header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            background: var(--glass);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-link:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            transform: translateX(-5px);
        }

        .viewer-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at center, #112240, #0A192F);
        }

        .media-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            animation: fadeIn 0.8s ease-out;
        }

        .media-container img,
        .media-container video {
            max-width: 100%;
            max-height: 80vh;
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Floating WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            z-index: 9999;
            transition: var(--transition);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .whatsapp-float:hover {
            transform: translateY(-5px) scale(1.05);
            background: #20ba59;
            box-shadow: 0 15px 35px rgba(37, 211, 102, 0.6);
            color: white;
        }

        @media (max-width: 768px) {
            .viewer-header {
                padding: 1rem;
            }

            .viewer-content {
                padding: 1rem;
            }

            .whatsapp-float {
                bottom: 20px;
                right: 20px;
                padding: 10px;
                border-radius: 50%;
            }

            .whatsapp-float span {
                display: none;
            }
        }
    </style>
</head>

<body>
    <header class="viewer-header">
        <a href="index.html#gallery" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Gallery
        </a>
        <h2 style="font-family: 'El Messiri', sans-serif; color: var(--accent);">Noor Iftar Series</h2>
    </header>

    <main class="viewer-content">
        <div id="mediaTarget" class="media-container">
            <!-- Dynamic Media Content -->
        </div>
    </main>

    <a href="https://wa.me/916383360375" class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
        <span>Chat with Us</span>
    </a>

    <script>
        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const mediaSrc = urlParams.get('img') || urlParams.get('vid');
            const target = document.getElementById('mediaTarget');

            if (!mediaSrc) {
                window.location.href = 'index.html';
                return;
            }

            const extension = mediaSrc.split('.').pop().toLowerCase();
            const videoExtensions = ['mp4', 'webm', 'ogg'];

            if (videoExtensions.includes(extension)) {
                target.innerHTML = `<video src="${mediaSrc}" controls autoplay loop></video>`;
            } else {
                target.innerHTML = `<img src="${mediaSrc}" alt="Event Photo">`;
            }
        };
    </script>
</body>

</html>
